:root {
  --bg:     #020408;
  --bg2:    #060c14;
  --bg3:    #0a1220;
  --border: #142535;
  --border2:#1e3a55;
  --text:   #f5fbff;
  --dim:    #7aabc8;
  --green:  #00ff88;
  --red:    #ff2d55;
  --yellow: #ffe600;
  --blue:   #00cfff;
  --purple: #bf5fff;
  --orange: #ff9500;
  --accent: #ffe600;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden;}

.header{display:flex;align-items:center;gap:14px;padding:9px 16px;background:var(--bg2);border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:200;flex-wrap:wrap;}
.logo{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;color:var(--accent);letter-spacing:3px;text-shadow:0 0 14px rgba(255,230,0,.55);white-space:nowrap;}
.sep{width:1px;height:22px;background:var(--border2);flex-shrink:0;}

.tf-group{display:flex;gap:3px;}
.tf-btn{padding:3px 8px;background:transparent;border:1px solid var(--border2);color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:10px;cursor:pointer;border-radius:3px;transition:all .15s;}
.tf-btn:hover{color:var(--text);}
.tf-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}

.col-toggle-wrap{display:flex;gap:3px;flex-wrap:wrap;}
.col-tog{padding:3px 7px;background:transparent;border:1px solid var(--border2);color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:10px;cursor:pointer;border-radius:3px;transition:all .15s;user-select:none;opacity:.45;}
.col-tog.on{background:rgba(0,207,255,.1);border-color:var(--blue);color:var(--blue);opacity:1;}

.search-box{padding:4px 9px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;border-radius:3px;width:150px;outline:none;}
.search-box:focus{border-color:var(--accent);}
.filter-select{padding:4px 7px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:10px;border-radius:3px;outline:none;cursor:pointer;}

.stats-bar{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;background:var(--bg2);}
.stat-cell{padding:6px 14px;border-right:1px solid var(--border);white-space:nowrap;flex-shrink:0;}
.stat-label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;}
.stat-val{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--text);margin-top:1px;}

.refresh-btn{padding:4px 12px;background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:10px;cursor:pointer;border-radius:3px;transition:all .15s;margin-left:auto;}
.refresh-btn:hover{background:var(--accent);color:#000;}
.refresh-btn.loading{opacity:.4;pointer-events:none;}
.last-upd{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);white-space:nowrap;}

/* TABLE */
.table-container{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 120px);}
table{width:100%;border-collapse:collapse;font-family:'IBM Plex Mono',monospace;}
thead{position:sticky;top:0;z-index:100;}
thead th{padding:10px 12px;font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:1px;background:#03070e;border-bottom:2px solid var(--border2);border-right:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;transition:color .15s;}
thead th:hover{color:var(--accent);}
thead th.sort-asc::after{content:' ↑';color:var(--accent);}
thead th.sort-desc::after{content:' ↓';color:var(--accent);}
thead th:last-child{border-right:none;}
tbody tr{border-bottom:1px solid #070e18;transition:background .1s;}
tbody tr:hover{background:#0a1828;}
tbody td{padding:9px 12px;font-size:13px;border-right:1px solid #060d18;vertical-align:middle;white-space:nowrap;}
tbody td:last-child{border-right:none;}

/* CELLS */
.c-sym{font-size:12px;font-weight:700;color:var(--accent);text-shadow:0 0 8px rgba(255,230,0,.3);letter-spacing:.8px;}
.c-price{font-size:14px;font-weight:700;color:#ffffff;}
.c-pos{color:var(--green);text-shadow:0 0 5px rgba(0,255,136,.3);}
.c-neg{color:var(--red);text-shadow:0 0 5px rgba(255,45,85,.3);}
.c-neu{color:var(--yellow);}
.c-dim{color:var(--dim);font-size:12px;}
.chg-badge{display:inline-block;padding:2px 5px;border-radius:3px;font-size:11px;font-weight:600;}
.chg-badge.pos{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.2);}
.chg-badge.neg{background:rgba(255,45,85,.1);color:var(--red);border:1px solid rgba(255,45,85,.2);}

/* SPARKLINE CANVAS */
.spark-wrap{position:relative;width:120px;height:36px;display:inline-block;}
.spark-wrap canvas{display:block;}
.spark-val{position:absolute;bottom:0;right:0;font-size:9px;font-family:'IBM Plex Mono',monospace;}

/* CB PREMIUM */
.cb-val{font-size:12px;font-weight:600;}

/* SIGNAL */
.sig-wrap{display:flex;gap:3px;flex-wrap:wrap;}
.badge{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:2px 5px;border-radius:2px;font-weight:600;white-space:nowrap;}
.b-bull{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.3);}
.b-bear{background:rgba(255,45,85,.1);color:var(--red);border:1px solid rgba(255,45,85,.3);}

.b-sq{background:rgba(191,95,255,.1);color:var(--purple);border:1px solid rgba(191,95,255,.3);}

.col-hidden{display:none!important;}

.loading-full{display:flex;align-items:center;justify-content:center;padding:60px;gap:10px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim);}
.spinner{width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
a.sym-link:hover .c-sym{text-shadow:0 0 12px rgba(255,230,0,.7);}
tbody tr:hover .c-sym{border-bottom-color:rgba(255,230,0,.7);}

// ── UTILS ──
async function fetchJSON(url, retries=2) {
  for (let i=0;i<=retries;i++) {
    try {
      const r = await fetch(url);
      if (r.status===429) { await sleep(1200*(i+1)); continue; }
      if (!r.ok) throw new Error(r.status);
      return r.json();
    } catch(e) { if(i===retries) throw e; await sleep(500); }
  }
}
const sleep = ms => new Promise(r=>setTimeout(r,ms));

function fNum(n,dec=2) {
  if(n===null||n===undefined||isNaN(n)) return '–';
  const a=Math.abs(n);
  if(a>=1e9) return (n/1e9).toFixed(dec)+'B';
  if(a>=1e6) return (n/1e6).toFixed(dec)+'M';
  if(a>=1e3) return (n/1e3).toFixed(dec)+'K';
  return n.toFixed(dec);
}
function fPrice(p) {
  if(!p&&p!==0) return '–';
  if(p>=10000) return p.toLocaleString('en-US',{maximumFractionDigits:0});
  if(p>=100)   return p.toFixed(2);
  if(p>=1)     return p.toFixed(4);
  return p.toFixed(6);
}

// ── FETCH ALL TICKERS ──
async function getAllTickers() {
  const data = await fetchJSON(`${BASE}/fapi/v1/ticker/24hr`);
  const map = {};
  data.forEach(d=>{
    if (!d.symbol.endsWith('USDT')) return;
    const sym = d.symbol.replace('USDT','');
    map[sym] = {
      price:  parseFloat(d.lastPrice),
      chg24:  parseFloat(d.priceChangePercent),
      vol24:  parseFloat(d.quoteVolume),
      high:   parseFloat(d.highPrice),
      low:    parseFloat(d.lowPrice),
    };
  });
  return map;
}

async function getAllFunding() {
  const data = await fetchJSON(`${BASE}/fapi/v1/premiumIndex`);
  const map = {};
  data.forEach(d=>{
    if (!d.symbol.endsWith('USDT')) return;
    map[d.symbol.replace('USDT','')] = parseFloat(d.lastFundingRate);
  });
  return map;
}

async function getOI(sym) {
  try {
    const d = await fetchJSON(`${BASE}/fapi/v1/openInterest?symbol=${sym}USDT`);
    return parseFloat(d.openInterest);
  } catch { return null; }
}

// OI% = % change vs 4 periods ago
async function getOIPct(sym) {
  try {
    const periodMap={'1m':'5m','3m':'5m','15m':'15m','30m':'30m','1h':'1h','2h':'2h','4h':'4h','1d':'1d','1w':'1d'};
    const period = periodMap[currentTF]||'15m';
    const d = await fetchJSON(`${BASE}/futures/data/openInterestHist?symbol=${sym}USDT&period=${period}&limit=5`);
    if(!d||d.length<2) return null;
    const latest=parseFloat(d[d.length-1].sumOpenInterest);
    const prev=parseFloat(d[0].sumOpenInterest);
    return prev>0?((latest-prev)/prev)*100:null;
  } catch { return null; }
}

// CVD Spot: cumulative delta of spot klines (taker buy - taker sell) over 7 days
// Uses 1h klines, 168 candles = 7 days, returns array of cumulative values
async function getCVDSpot(sym) {
  try {
    const d = await fetchJSON(`${SBASE}/api/v3/klines?symbol=${sym}USDT&interval=1h&limit=168`);
    if(!d||d.length<2) return null;
    const deltas = d.map(k=>{
      const vol   = parseFloat(k[5]);
      const buyVol= parseFloat(k[9]);
      return (buyVol - (vol - buyVol)); // buy vol - sell vol
    });
    // cumulative sum
    const cvd = [];
    let cum = 0;
    deltas.forEach(v=>{ cum+=v; cvd.push(cum); });
    return cvd;
  } catch { return null; }
}

// CVD Futures: same but futures klines
async function getCVDFutures(sym) {
  try {
    const d = await fetchJSON(`${BASE}/fapi/v1/klines?symbol=${sym}USDT&interval=1h&limit=168`);
    if(!d||d.length<2) return null;
    const deltas = d.map(k=>{
      const vol   = parseFloat(k[5]);
      const buyVol= parseFloat(k[9]);
      return (buyVol - (vol - buyVol));
    });
    const cvd = [];
    let cum = 0;
    deltas.forEach(v=>{ cum+=v; cvd.push(cum); });
    return cvd;
  } catch { return null; }
}

// Coinbase Premium: (Coinbase BTC price - Binance BTC price) / Binance BTC price * 100
// For non-BTC: use BTC premium as proxy, or compare spot prices
async function getCBPremium(sym) {
  try {
    // Coinbase doesn't have public CORS-friendly API for all coins
    // Use Binance spot vs futures basis as proxy (spot premium over futures)
    const [spot, fut] = await Promise.all([
      fetchJSON(`${SBASE}/api/v3/ticker/price?symbol=${sym}USDT`).catch(()=>null),
      fetchJSON(`${BASE}/fapi/v1/ticker/price?symbol=${sym}USDT`).catch(()=>null),
    ]);
    if(!spot||!fut) return null;
    const sp = parseFloat(spot.price);
    const fp = parseFloat(fut.price);
    if(!sp||!fp) return null;
    return ((sp-fp)/fp)*100; // spot premium over futures (%)
  } catch { return null; }
}

// Volume change 24h: compare today vs yesterday kline
async function getVolChange(sym) {
  try {
    const d = await fetchJSON(`${BASE}/fapi/v1/klines?symbol=${sym}USDT&interval=1d&limit=3`);
    if(!d||d.length<2) return null;
    const curr=parseFloat(d[d.length-1][7]);
    const prev=parseFloat(d[d.length-2][7]);
    return prev>0?((curr-prev)/prev)*100:null;
  } catch { return null; }
}


// ── FETCH MARKET CAPS from CoinGecko ──
async function fetchMarketCaps(symbols) {
  try {
    // Build id list using CMC_SLUGS as approximation (CoinGecko uses same slugs mostly)
    const ids = symbols.map(s => CMC_SLUGS[s] || s.toLowerCase()).join(',');
    const url = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&per_page=250&sparkline=false`;
    const data = await fetchJSON(url);
    if(!Array.isArray(data)) return;
    // Map back: find symbol by matching id to CMC_SLUGS
    const reverseSlug = {};
    Object.entries(CMC_SLUGS).forEach(([sym, slug]) => { reverseSlug[slug] = sym; });
    data.forEach(coin => {
      const sym = reverseSlug[coin.id] || coin.symbol.toUpperCase();
      if(coin.market_cap) mcapCache[sym] = coin.market_cap;
    });
  } catch(e) { console.warn('CoinGecko mcap fetch failed', e); }
}

// ── SPARKLINE RENDERER ──
// Returns an <img> data URL of a tiny line chart
function drawSparkline(values, color, width=120, height=36) {
  if(!values||values.length<2) return null;
  const canvas = document.createElement('canvas');
  canvas.width = width; canvas.height = height;
  const ctx = canvas.getContext('2d');
  const mn = Math.min(...values);
  const mx = Math.max(...values);
  const range = mx - mn || 1;
  const pad = 3;
  const pts = values.map((v,i)=>({
    x: pad + (i/(values.length-1))*(width-pad*2),
    y: pad + (1-(v-mn)/range)*(height-pad*2)
  }));
  // fill under line
  ctx.beginPath();
  ctx.moveTo(pts[0].x, height);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x, height);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0,0,0,height);
  grad.addColorStop(0, color+'33');
  grad.addColorStop(1, color+'00');
  ctx.fillStyle = grad;
  ctx.fill();
  // line
  ctx.beginPath();
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // last dot
  const last = pts[pts.length-1];
  ctx.beginPath();
  ctx.arc(last.x,last.y,2.5,0,Math.PI*2);
  ctx.fillStyle = color;
  ctx.fill();
  return canvas.toDataURL();
}

// ── SIGNALS ──
function getSignals(fund, oiPct, cvdSpot, cvdFut, cbPrem, chg24) {
  const badges=[];
  const f=fund*100;
  if(f < -0.02) badges.push({c:'b-sq',  t:'SQUEEZE? / Dễ tăng mạnh'});
  if(f >  0.06) badges.push({c:'b-bear',t:'OVERHTD / Quá nhiệt'});
  if(oiPct !== null && oiPct >  4) badges.push({c:'b-bull',t:'OI↑ / OI tăng'});
  if(oiPct !== null && oiPct < -4) badges.push({c:'b-bear',t:'OI↓ / OI giảm'});
  if(cbPrem !== null && cbPrem > 0.05)  badges.push({c:'b-bull',t:'CB+ / Dòng tiền vào'});
  if(cbPrem !== null && cbPrem < -0.05) badges.push({c:'b-bear',t:'CB– / Dòng tiền ra'});
  // CVD divergence: spot positive but futures negative = accumulation
  if(cvdSpot&&cvdFut) {
    const sLast=cvdSpot[cvdSpot.length-1]; const fLast=cvdFut[cvdFut.length-1];
    if(sLast>0&&fLast<0) badges.push({c:'b-bull',t:'CVD DIV+ / Tích lũy'});
    if(sLast<0&&fLast>0) badges.push({c:'b-bear',t:'CVD DIV– / Phân phối'});
  }
  if(badges.length===0) badges.push({c:'b-neu',t:'WATCH / Theo dõi'});
  return badges;
}

// ── RENDER ROW ──
function renderRow(d, idx) {
  const chgCls = d.chg24>=0?'pos':'neg';
  const chgSign = d.chg24>=0?'▲ +':'▼ ';
  const fVal = d.funding??0;
  const fCls = fVal>=0?'c-pos':'c-neg';
  const fSign = fVal>=0?'+':'';
  const oiPctCls = d.oiPct>1?'c-pos':d.oiPct<-1?'c-neg':'c-neu';
  const oiPctSign = d.oiPct>0?'▲ +':d.oiPct<0?'▼ ':'';
  const oiPctDisp = d.oiPct!==null?`${oiPctSign}${d.oiPct.toFixed(2)}%`:'–';
  const mcap = mcapCache[d.sym] ?? null;
  const sigs = getSignals(fVal, d.oiPct, d.cvdSpot, d.cvdFut, d.cbPrem, d.chg24);

  // Vol change
  const volChgHtml = d.volChgPct!==null&&d.volChgPct!==undefined
    ? `<span class="${d.volChgPct>=0?'c-pos':'c-neg'}" style="font-weight:600">${d.volChgPct>=0?'▲ +':'▼ '}${d.volChgPct.toFixed(1)}%</span>`
    : '<span class="c-dim">–</span>';

  // CVD sparklines
  const spotImg  = d.cvdSpot  ? drawSparkline(d.cvdSpot,  '#ffffff', 120, 36) : null;
  const futImg   = d.cvdFut   ? drawSparkline(d.cvdFut,   '#ff9500', 120, 36) : null;
  const spotLast = d.cvdSpot  ? d.cvdSpot[d.cvdSpot.length-1]  : null;
  const futLast  = d.cvdFut   ? d.cvdFut[d.cvdFut.length-1]    : null;
  const spotCls  = spotLast>0?'c-pos':'c-neg';
  const futCls   = futLast>0?'c-pos':'c-neg';

  const cvdSpotHtml = spotImg
    ? `<div class="spark-wrap"><img src="${spotImg}" width="120" height="36"><span class="spark-val ${spotCls}">${fNum(spotLast,0)}</span></div>`
    : '<span class="c-dim">loading…</span>';
  const cvdFutHtml = futImg
    ? `<div class="spark-wrap"><img src="${futImg}" width="120" height="36"><span class="spark-val ${futCls}" style="color:var(--orange)">${fNum(futLast,0)}</span></div>`
    : '<span class="c-dim">loading…</span>';

  // CB Premium
  const cbVal = d.cbPrem;
  const cbCls = cbVal>0.02?'c-pos':cbVal<-0.02?'c-neg':'c-dim';
  const cbSign = cbVal>0?'+':'';
  const cbHtml = cbVal!==null
    ? `<span class="${cbCls} cb-val">${cbSign}${cbVal.toFixed(4)}%</span><span style="display:block;font-size:9px;color:var(--dim)">Spot vs Perp</span>`
    : '<span class="c-dim">–</span>';

  return `<tr data-sym="${d.sym}">
    <td style="color:var(--dim);font-size:10px">${idx+1}</td>
    <td><a href="https://coinmarketcap.com/currencies/${(CMC_SLUGS[d.sym]||d.sym).toLowerCase()}/" target="_blank" style="text-decoration:none">
      <span class="c-sym" style="cursor:pointer;border-bottom:1px dotted rgba(255,230,0,.3)">${d.sym}</span>
      ${COIN_NAMES[d.sym]?`<span style="display:block;font-size:9px;color:var(--dim);margin-top:1px;letter-spacing:.3px">${COIN_NAMES[d.sym]}</span>`:''}
    </a></td>
    <td data-col="price"><span class="c-price">$${fPrice(d.price)}</span></td>
    <td data-col="chg24"><span class="chg-badge ${chgCls}">${chgSign}${d.chg24.toFixed(2)}%</span></td>
    <td data-col="vol24"><span style="color:#cce8ff">$${fNum(d.vol24)}</span></td>
    <td data-col="volchg">${volChgHtml}</td>
    <td data-col="mcap"><span style="color:#a0d0f0;font-size:12px">$${fNum(mcap,0)}</span></td>
    <td data-col="funding">
      <span class="${fCls}" style="font-weight:600">${fSign}${(fVal*100).toFixed(4)}%</span>
      <span style="display:block;font-size:9px;color:var(--dim)">${fVal>0?'Long pays':'Short pays'}</span>
    </td>
    <td data-col="oi"><span style="color:#cce8ff">${fNum(d.oi)}</span></td>
    <td data-col="oipct"><span class="${oiPctCls}" style="font-weight:600">${oiPctDisp}</span></td>
    <td data-col="cvdspot">${cvdSpotHtml}</td>
    <td data-col="cvdfut">${cvdFutHtml}</td>
    <td data-col="cbprem">${cbHtml}</td>
    <td data-col="signal"><div class="sig-wrap">${sigs.map(s=>`<span class="badge ${s.c}">${s.t}</span>`).join('')}</div></td>
  </tr>`;
}

// ── SORT & FILTER ──
function sortBy(key) {
  if(sortKey===key) sortDir*=-1;
  else { sortKey=key; sortDir=-1; }
  applyFilters();
}

function applyFilters() {
  const q  = document.getElementById('searchBox').value.trim().toUpperCase();
  const ft = document.getElementById('filterType').value;
  const sc = document.getElementById('sortCol').value;

  if(sc) {
    const parts=sc.split('_'); const dir=parts.pop();
    sortKey=parts.join('_'); sortDir=dir==='desc'?-1:1;
    document.getElementById('sortCol').value='';
  }

  let filtered = allCoinsData.filter(d=>{
    if(q && !d.sym.includes(q)) return false;
    if(ft==='squeeze')    return d.funding*100 < -0.01;
    if(ft==='overheated') return d.funding*100 > 0.05;
    if(ft==='oiup')       return d.oiPct!==null&&d.oiPct>2;
    if(ft==='oidown')     return d.oiPct!==null&&d.oiPct<-2;
    if(ft==='gainers')    return d.chg24>3;
    if(ft==='losers')     return d.chg24<-3;
    if(ft==='cbpos')      return d.cbPrem!==null&&d.cbPrem>0.02;
    if(ft==='cbneg')      return d.cbPrem!==null&&d.cbPrem<-0.02;
    return true;
  });

  const keyMap={
    sym:'sym',price:'price',chg24:'chg24',vol24:'vol24',
    volchg:'volChgPct',mcap:d=>mcapCache[d.sym]??0,
    funding:'funding',oi:'oi',oipct:'oiPct',
    cbprem:'cbPrem'
  };
  filtered.sort((a,b)=>{
    const fn=keyMap[sortKey];
    const va=typeof fn==='function'?fn(a):(a[fn]??-Infinity);
    const vb=typeof fn==='function'?fn(b):(b[fn]??-Infinity);
    return (va-vb)*sortDir;
  });

  const tbody=document.getElementById('tableBody');
  tbody.innerHTML=filtered.map((d,i)=>renderRow(d,i)).join('');

  hiddenCols.forEach(col=>{
    document.querySelectorAll(`[data-col="${col}"]`).forEach(el=>el.classList.add('col-hidden'));
  });

  updateStats(allCoinsData);
}

// ── STATS ──
function updateStats(data) {
  const fpos=data.filter(d=>d.funding>0).length;
  const fneg=data.filter(d=>d.funding<0).length;
  const oiup=data.filter(d=>d.oiPct!==null&&d.oiPct>0).length;
  const oidn=data.filter(d=>d.oiPct!==null&&d.oiPct<0).length;
  const sq  =data.filter(d=>d.funding*100<-0.01).length;
  const cbp =data.filter(d=>d.cbPrem!==null&&d.cbPrem>0.02).length;
  const s24 =[...data].sort((a,b)=>b.chg24-a.chg24);
  document.getElementById('s-coins').textContent=data.length;
  document.getElementById('s-fpos').textContent=fpos;
  document.getElementById('s-fneg').textContent=fneg;
  document.getElementById('s-oiup').textContent=oiup;
  document.getElementById('s-oidn').textContent=oidn;
  document.getElementById('s-cbp').textContent=cbp+' coins';
  document.getElementById('s-sq').textContent=sq+' coins';
  document.getElementById('s-top').textContent=s24[0]?`${s24[0].sym} +${s24[0].chg24.toFixed(1)}%`:'–';
  document.getElementById('s-bot').textContent=s24[s24.length-1]?`${s24[s24.length-1].sym} ${s24[s24.length-1].chg24.toFixed(1)}%`:'–';
}

// ── COLUMN TOGGLE ──
function toggleCol(btn) {
  const col=btn.dataset.col;
  btn.classList.toggle('on');
  const on=btn.classList.contains('on');
  if(on) hiddenCols.delete(col); else hiddenCols.add(col);
  // hide/show both th and td
  document.querySelectorAll(`[data-col="${col}"]`).forEach(el=>el.classList.toggle('col-hidden',!on));
  // dim the thead th when hidden
  const th=document.querySelector(`thead th[data-col="${col}"]`);
  if(th) th.style.opacity=on?'1':'0.3';
}

// ── TIMEFRAME ──
function setTF(tf,btn) {
  currentTF=tf;
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadAll();
}

// ── MAIN LOAD ──
async function loadAll() {
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('loading'); btn.textContent='↻ LOADING...';
  document.getElementById('loadingMsg').style.display='flex';
  document.getElementById('mainTable').style.display='none';

  try {
    const [tickers, funding] = await Promise.all([getAllTickers(), getAllFunding()]);
    const syms = Object.keys(tickers);

    allCoinsData = syms.map(sym=>({
      sym, ...tickers[sym],
      funding: funding[sym]??0,
      oi:null, oiPct:null, volChgPct:null,
      cvdSpot:null, cvdFut:null, cbPrem:null
    }));

    allCoinsData.sort((a,b)=>b.vol24-a.vol24);
    // Fetch real market caps for top 200 coins
    const top200syms = allCoinsData.slice(0,200).map(d=>d.sym);
    fetchMarketCaps(top200syms).then(()=>applyFilters());
    document.getElementById('loadingMsg').style.display='none';
    document.getElementById('mainTable').style.display='';
    applyFilters();

    // Load details for top 60 by volume in batches of 4
    const top60 = allCoinsData.slice(0,60);
    const BATCH = 4;
    for(let i=0;i<top60.length;i+=BATCH) {
      const batch=top60.slice(i,i+BATCH);
      await Promise.all(batch.map(async d=>{
        const [oi,oiPct,volChgPct,cvdSpot,cvdFut,cbPrem]=await Promise.all([
          getOI(d.sym),
          getOIPct(d.sym),
          getVolChange(d.sym),
          getCVDSpot(d.sym),
          getCVDFutures(d.sym),
          getCBPremium(d.sym),
        ]);
        d.oi=oi; d.oiPct=oiPct; d.volChgPct=volChgPct;
        d.cvdSpot=cvdSpot; d.cvdFut=cvdFut; d.cbPrem=cbPrem;
      }));
      applyFilters();
      if(i+BATCH<top60.length) await sleep(400);
    }

    document.getElementById('lastUpd').textContent='Updated '+new Date().toLocaleTimeString('vi-VN');
  } catch(e) {
    console.error(e);
    document.getElementById('loadingMsg').innerHTML=`<span style="color:var(--red)">⚠ Error: ${e.message}</span>`;
    document.getElementById('loadingMsg').style.display='flex';
  }

  btn.classList.remove('loading'); btn.textContent='↻ REFRESH';
}

setInterval(loadAll, 90000);
loadAll();
</script>
