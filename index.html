<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DERIV // MONITOR</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
:root {
  --bg:     #020408;
  --bg2:    #060c14;
  --bg3:    #0a1220;
  --border: #0f1e30;
  --border2:#1a2f48;
  --text:   #e8f4ff;
  --dim:    #3a5a7a;
  --green:  #00ff88;
  --red:    #ff2d55;
  --yellow: #ffe600;
  --blue:   #00cfff;
  --purple: #bf5fff;
  --accent: #ffe600;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;min-height:100vh;overflow-x:hidden;}

/* ── HEADER ── */
.header{display:flex;align-items:center;gap:16px;padding:10px 18px;background:var(--bg2);border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:200;flex-wrap:wrap;}
.logo{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);letter-spacing:3px;text-shadow:0 0 14px rgba(255,230,0,.55);white-space:nowrap;}
.sep{width:1px;height:24px;background:var(--border2);flex-shrink:0;}

/* timeframe */
.tf-group{display:flex;gap:3px;}
.tf-btn{padding:4px 9px;background:transparent;border:1px solid var(--border2);color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:10px;cursor:pointer;border-radius:3px;transition:all .15s;}
.tf-btn:hover{color:var(--text);border-color:#2a4060;}
.tf-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}

/* column toggles */
.col-toggle-wrap{display:flex;gap:4px;flex-wrap:wrap;}
.col-tog{padding:3px 8px;background:transparent;border:1px solid var(--border2);color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:10px;cursor:pointer;border-radius:3px;transition:all .15s;user-select:none;}
.col-tog.on{background:rgba(0,207,255,.12);border-color:var(--blue);color:var(--blue);}

/* search + filter */
.search-box{padding:5px 10px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;border-radius:3px;width:160px;outline:none;}
.search-box:focus{border-color:var(--accent);}
.filter-select{padding:5px 8px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:10px;border-radius:3px;outline:none;cursor:pointer;}

/* stats bar */
.stats-bar{display:flex;gap:0;border-bottom:1px solid var(--border);overflow-x:auto;background:var(--bg2);}
.stat-cell{padding:7px 16px;border-right:1px solid var(--border);white-space:nowrap;flex-shrink:0;}
.stat-label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;}
.stat-val{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--text);margin-top:1px;}

/* refresh */
.refresh-btn{padding:5px 13px;background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:10px;cursor:pointer;border-radius:3px;transition:all .15s;margin-left:auto;}
.refresh-btn:hover{background:var(--accent);color:#000;}
.refresh-btn.loading{opacity:.45;pointer-events:none;}
.last-upd{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);white-space:nowrap;}

/* ── TABLE ── */
.table-container{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 130px);}
table{width:100%;border-collapse:collapse;font-family:'IBM Plex Mono',monospace;}
thead{position:sticky;top:0;z-index:100;}
thead th{
  padding:9px 12px;
  font-size:10px;font-weight:600;color:var(--dim);
  text-transform:uppercase;letter-spacing:1px;
  background:#04090f;
  border-bottom:2px solid var(--border2);
  border-right:1px solid var(--border);
  white-space:nowrap;cursor:pointer;user-select:none;
  transition:color .15s;
}
thead th:hover{color:var(--accent);}
thead th.sort-asc::after{content:' ↑';color:var(--accent);}
thead th.sort-desc::after{content:' ↓';color:var(--accent);}
thead th:last-child{border-right:none;}

tbody tr{border-bottom:1px solid #080f18;transition:background .1s;}
tbody tr:hover{background:#0a1828;}
tbody tr.loading-row{opacity:.25;}
tbody td{
  padding:8px 12px;
  font-size:12px;
  border-right:1px solid #070e18;
  vertical-align:middle;
  white-space:nowrap;
}
tbody td:last-child{border-right:none;}

/* cell types */
.c-sym{font-size:12px;font-weight:700;color:var(--accent);text-shadow:0 0 8px rgba(255,230,0,.3);letter-spacing:.8px;}
.c-price{font-size:13px;font-weight:700;color:#fff;}
.c-pos{color:var(--green);text-shadow:0 0 6px rgba(0,255,136,.35);}
.c-neg{color:var(--red);text-shadow:0 0 6px rgba(255,45,85,.35);}
.c-neu{color:var(--yellow);}
.c-dim{color:var(--dim);font-size:11px;}
.chg-badge{display:inline-block;padding:2px 6px;border-radius:3px;font-size:11px;font-weight:600;}
.chg-badge.pos{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.2);}
.chg-badge.neg{background:rgba(255,45,85,.1);color:var(--red);border:1px solid rgba(255,45,85,.2);}

/* mini bar */
.mini-bar-wrap{display:flex;align-items:center;gap:5px;}
.mini-track{width:55px;height:4px;background:rgba(255,45,85,.2);border-radius:2px;overflow:hidden;flex-shrink:0;}
.mini-fill-g{height:100%;background:var(--green);border-radius:2px;}
.mini-fill-b{height:100%;background:var(--blue);border-radius:2px;}

/* signal badges */
.sig-wrap{display:flex;gap:3px;flex-wrap:wrap;}
.badge{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:2px 6px;border-radius:2px;font-weight:600;white-space:nowrap;}
.b-bull{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.3);text-shadow:0 0 5px rgba(0,255,136,.4);}
.b-bear{background:rgba(255,45,85,.1);color:var(--red);border:1px solid rgba(255,45,85,.3);text-shadow:0 0 5px rgba(255,45,85,.4);}
.b-neu{background:rgba(255,230,0,.07);color:var(--yellow);border:1px solid rgba(255,230,0,.25);text-shadow:0 0 5px rgba(255,230,0,.35);}
.b-sq{background:rgba(191,95,255,.1);color:var(--purple);border:1px solid rgba(191,95,255,.3);text-shadow:0 0 5px rgba(191,95,255,.4);}

/* col hidden */
.col-hidden{display:none;}

/* loading */
.loading-full{display:flex;align-items:center;justify-content:center;padding:60px;gap:10px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim);}
.spinner{width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">DERIV // MONITOR</div>
  <div class="sep"></div>

  <!-- Timeframe -->
  <div class="tf-group" id="tfGroup">
    <button class="tf-btn" onclick="setTF('1m',this)">1m</button>
    <button class="tf-btn" onclick="setTF('3m',this)">3m</button>

    <button class="tf-btn" onclick="setTF('1w',this)">1w</button>
  </div>

  <div class="sep"></div>

  <!-- Column toggles -->
  <div class="col-toggle-wrap">
    <span style="font-size:9px;color:var(--dim);align-self:center;margin-right:2px;text-transform:uppercase;letter-spacing:.8px">Cột:</span>
    <button class="col-tog on" data-col="price"    onclick="toggleCol(this)">Giá</button>
    <button class="col-tog on" data-col="chg24"    onclick="toggleCol(this)">24h%</button>

    <button class="col-tog on" data-col="volchg"   onclick="toggleCol(this)">Vol Chg%</button>
    <button class="col-tog on" data-col="mcap"     onclick="toggleCol(this)">Mkt Cap</button>
    <button class="col-tog on" data-col="funding"  onclick="toggleCol(this)">Funding</button>
    <button class="col-tog on" data-col="oi"       onclick="toggleCol(this)">OI</button>
    <button class="col-tog on" data-col="oichg"    onclick="toggleCol(this)">OI Chg%</button>
    <button class="col-tog on" data-col="ls"       onclick="toggleCol(this)">L/S</button>
    <button class="col-tog on" data-col="taker"    onclick="toggleCol(this)">Taker</button>
    <button class="col-tog on" data-col="high52w"  onclick="toggleCol(this)">H/L</button>

  <div class="sep"></div>

  <!-- Search & Filter -->
  <input class="search-box" id="searchBox" type="text" placeholder="🔍 Tìm coin..." oninput="applyFilters()">
  <select class="filter-select" id="filterType" onchange="applyFilters()">
    <option value="all">Tất cả</option>

  </select>
  <select class="filter-select" id="sortCol" onchange="applyFilters()">
    <option value="">Sắp xếp theo...</option>
    <option value="vol24_desc">Volume cao nhất</option>
    <option value="chg24_desc">Tăng nhiều nhất</option>
    <option value="chg24_asc">Giảm nhiều nhất</option>
    <option value="funding_asc">Funding âm nhất</option>
    <option value="funding_desc">Funding dương nhất</option>
    <option value="oi_desc">OI cao nhất</option>
    <option value="oichg_desc">OI tăng nhất</option>
    <option value="volchg_desc">Vol tăng nhất 24h</option>
    <option value="volchg_asc">Vol giảm nhất 24h</option>
  </select>

  <span class="last-upd" id="lastUpd">–</span>
  <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">↻ REFRESH</button>
</div>

<!-- Stats bar -->
<div class="stats-bar" id="statsBar">
  <div class="stat-cell"><div class="stat-label">Coins</div><div class="stat-val" id="s-coins">–</div></div>
  <div class="stat-cell"><div class="stat-label">Fund Dương</div><div class="stat-val c-pos" id="s-fpos">–</div></div>
  <div class="stat-cell"><div class="stat-label">Fund Âm</div><div class="stat-val c-neg" id="s-fneg">–</div></div>
  <div class="stat-cell"><div class="stat-label">OI Tăng</div><div class="stat-val c-pos" id="s-oiup">–</div></div>

  <div class="stat-cell"><div class="stat-label">Squeeze Potential</div><div class="stat-val" id="s-sq" style="color:var(--purple)">–</div></div>
</div>

<!-- Table -->
<div class="table-container">
  <div class="loading-full" id="loadingMsg"><div class="spinner"></div> Đang tải tất cả coin Binance Futures...</div>
  <table id="mainTable" style="display:none">
    <thead>
      <tr>
        <th onclick="sortBy('sym')"     data-col="sym"    >#</th>
        <th onclick="sortBy('sym')"     data-col="sym"    >SYMBOL</th>
        <th onclick="sortBy('price')"   data-col="price"  >PRICE</th>
        <th onclick="sortBy('chg24')"   data-col="chg24"  >24H %</th>
        <th onclick="sortBy('vol24')"   data-col="vol24"  >VOLUME 24H</th>
        <th onclick="sortBy('volchg')"  data-col="volchg" >VOL CHG 24H</th>

        <th onclick="sortBy('funding')" data-col="funding">FUNDING</th>
        <th onclick="sortBy('oi')"      data-col="oi"     >OPEN INTEREST</th>
        <th onclick="sortBy('oichg')"   data-col="oichg"  >OI CHG%</th>
        <th onclick="sortBy('ls')"      data-col="ls"     >L/S RATIO</th>
        <th onclick="sortBy('taker')"   data-col="taker"  >TAKER BUY</th>
        <th data-col="high52w">HIGH / LOW</th>

      </tr>

    <tbody id="tableBody"></tbody>

<script>
const BASE = 'https://fapi.binance.com';
let currentTF = '15m';
let allCoinsData = [];
let sortKey = 'vol24';
let sortDir = -1; // -1 desc, 1 asc
let hiddenCols = new Set();

// ── FETCH HELPERS ──
async function fetchJSON(url, retries=2) {
  for (let i=0;i<=retries;i++) {
    try {
      const r = await fetch(url);
      if (r.status===429) { await sleep(1200*(i+1)); continue; }
      if (!r.ok) throw new Error(r.status);
      return r.json();
    } catch(e) { if(i===retries) throw e; await sleep(500); }
  }
}
const sleep = ms => new Promise(r=>setTimeout(r,ms));

// ── DATA FETCHERS ──
async function getAllSymbols() {
  const data = await fetchJSON(`${BASE}/fapi/v1/exchangeInfo`);
  return data.symbols.filter(s=>s.status==='TRADING' && s.quoteAsset==='USDT').map(s=>s.baseAsset);
}

async function getAllTickers() {
  const data = await fetchJSON(`${BASE}/fapi/v1/ticker/24hr`);
  const map = {};
  data.forEach(d=>{
    if (!d.symbol.endsWith('USDT')) return;
    const sym = d.symbol.replace('USDT','');
    map[sym] = {
      price:   parseFloat(d.lastPrice),
      chg24:   parseFloat(d.priceChangePercent),
      vol24:   parseFloat(d.quoteVolume),
      vol24cnt:parseFloat(d.count),           // số lệnh 24h
      volChg:  parseFloat(d.quoteVolume) - parseFloat(d.prevClosePrice) * parseFloat(d.volume), // sẽ tính lại bên dưới
      high:    parseFloat(d.highPrice),
      low:     parseFloat(d.lowPrice),
      prevVol: parseFloat(d.volume),          // base volume để so sánh
    };
  });
  return map;
}

async function getAllFunding() {
  const data = await fetchJSON(`${BASE}/fapi/v1/premiumIndex`);
  const map = {};
  data.forEach(d=>{
    if (!d.symbol.endsWith('USDT')) return;
    map[d.symbol.replace('USDT','')] = parseFloat(d.lastFundingRate);
  });
  return map;
}

async function getAllOI() {
  const data = await fetchJSON(`${BASE}/fapi/v1/openInterest`).catch(()=>null);
  // fallback: fetch per batch if bulk not available
  return null;
}

async function getOI(sym) {
  try {
    const d = await fetchJSON(`${BASE}/fapi/v1/openInterest?symbol=${sym}USDT`);
    return parseFloat(d.openInterest);
  } catch { return null; }
}

async function getOIChange(sym) {
  try {
    // Use period mapping for openInterestHist
    const periodMap = {'1m':'5m','3m':'5m','15m':'15m','30m':'30m','1h':'1h','2h':'2h','4h':'4h','1d':'1d','1w':'1d'};
    const period = periodMap[currentTF] || '15m';
    const d = await fetchJSON(`${BASE}/futures/data/openInterestHist?symbol=${sym}USDT&period=${period}&limit=5`);
    if (!d||d.length<2) return null;
    const latest = parseFloat(d[d.length-1].sumOpenInterest);
    const prev   = parseFloat(d[0].sumOpenInterest);
    return prev>0 ? ((latest-prev)/prev)*100 : null;
  } catch { return null; }
}

async function getLSRatio(sym) {
  const endpoints = [
    `${BASE}/futures/data/globalLongShortAccountRatio?symbol=${sym}USDT&period=${currentTF}&limit=1`,
    `${BASE}/futures/data/topLongShortAccountRatio?symbol=${sym}USDT&period=${currentTF}&limit=1`,
  ];
  for (const url of endpoints) {
    try {
      const d = await fetchJSON(url);
      if (d&&d.length>0) {
        const v = parseFloat(d[0].longShortRatio);
        if (!isNaN(v)&&v>0) return v;
      }
    } catch {}
  }
  return null;
}

async function getTaker(sym) {
  try {
    const limit = {'1m':12,'3m':8,'15m':8,'30m':6,'1h':6,'2h':4,'4h':4,'1d':3,'1w':2}[currentTF]||8;
    const d = await fetchJSON(`${BASE}/fapi/v1/klines?symbol=${sym}USDT&interval=${currentTF}&limit=${limit}`);
    let tot=0, buy=0;
    d.forEach(k=>{ tot+=parseFloat(k[5]); buy+=parseFloat(k[9]); });
    return tot>0 ? buy/tot : null;
  } catch { return null; }
}

// ── FORMAT ──
function fNum(n,dec=2) {
  if(n===null||n===undefined||isNaN(n)) return '–';
  const a=Math.abs(n);
  if(a>=1e9) return (n/1e9).toFixed(dec)+'B';
  if(a>=1e6) return (n/1e6).toFixed(dec)+'M';
  if(a>=1e3) return (n/1e3).toFixed(dec)+'K';
  return n.toFixed(dec);
}
function fPrice(p) {
  if(!p) return '–';
  if(p>=10000) return p.toLocaleString('en-US',{maximumFractionDigits:0});
  if(p>=100)   return p.toFixed(2);
  if(p>=1)     return p.toFixed(4);
  return p.toFixed(6);
}

// ── SIGNALS ──
function getSignals(fund, ls, oiChg, taker, chg24) {
  const badges=[];
  const f = fund*100;
  if(f < -0.02) badges.push({c:'b-sq',  t:'SQUEEZE?'});
  if(f >  0.06) badges.push({c:'b-bear',t:'OVERHTD'});
  if(ls && ls < 0.65) badges.push({c:'b-bear',t:'SHORT DOM'});
  if(ls && ls > 1.6)  badges.push({c:'b-bull',t:'LONG DOM'});
  if(oiChg !== null && oiChg >  4) badges.push({c:'b-bull',t:'OI↑'});
  if(oiChg !== null && oiChg < -4) badges.push({c:'b-bear',t:'OI↓'});
  if(taker !== null && taker > 0.58) badges.push({c:'b-bull',t:'BUY PRESS'});
  if(taker !== null && taker < 0.42) badges.push({c:'b-bear',t:'SELL PRESS'});
  if(badges.length===0) badges.push({c:'b-neu',t:'WATCH'});
  return badges;
}

// ── RENDER ROW ──
function renderRow(d, idx) {
  const chgCls = d.chg24>=0?'pos':'neg';
  const chgSign = d.chg24>=0?'+':'';
  const fVal = d.funding??0;
  const fCls = fVal>=0?'c-pos':'c-neg';
  const fSign = fVal>=0?'+':'';
  const lsDisplay = d.ls ? d.ls.toFixed(3):'–';
  const lsPct = d.ls ? Math.min((d.ls/(1+d.ls))*100,100).toFixed(0):'50';
  const lsCls = d.ls>1?'c-pos':d.ls<1?'c-neg':'';
  const tkPct = d.taker !== null ? (d.taker*100).toFixed(1):'–';
  const tkCls = d.taker>0.55?'c-pos':d.taker<0.45?'c-neg':'c-neu';
  const oiChgCls = d.oiChg>1?'c-pos':d.oiChg<-1?'c-neg':'c-neu';
  const oiChgSign = d.oiChg>0?'+':'';
  const oiChgDisp = d.oiChg!==null?`${oiChgSign}${d.oiChg.toFixed(2)}%`:'–';
  const mcap = d.oi!==null&&d.price ? d.oi*d.price : null;
  const hl52 = `<span class="c-pos" style="font-size:10px">H ${fPrice(d.high)}</span><br><span class="c-neg" style="font-size:10px">L ${fPrice(d.low)}</span>`;
  const sigs = getSignals(fVal, d.ls, d.oiChg, d.taker, d.chg24);

  return `<tr data-sym="${d.sym}">
    <td style="color:var(--dim);font-size:10px">${idx+1}</td>
    <td><span class="c-sym">${d.sym}</span></td>
    <td data-col="price"><span class="c-price">$${fPrice(d.price)}</span></td>
    <td data-col="chg24"><span class="chg-badge ${chgCls}">${chgSign}${d.chg24.toFixed(2)}%</span></td>
    <td data-col="vol24"><span style="color:#cce8ff">$${fNum(d.vol24)}</span></td>
    <td data-col="volchg">${d.volChgPct!==null&&d.volChgPct!==undefined
      ? `<span class="${d.volChgPct>=0?'c-pos':'c-neg'}" style="font-weight:600">${d.volChgPct>=0?'+':''}${d.volChgPct.toFixed(1)}%</span><span style="display:block;font-size:9px;color:var(--dim)">vs hôm qua</span>`
      : '<span class="c-dim">–</span>'}</td>
    <td data-col="mcap"><span class="c-dim">$${fNum(mcap)}</span></td>
    <td data-col="funding">
      <span class="${fCls}" style="font-weight:600">${fSign}${(fVal*100).toFixed(4)}%</span>
      <span style="display:block;font-size:9px;color:var(--dim);margin-top:1px">${fVal>0?'Long pays':'Short pays'}</span>
    </td>
    <td data-col="oi"><span style="color:#cce8ff">${fNum(d.oi)}</span></td>
    <td data-col="oichg"><span class="${oiChgCls}" style="font-weight:600">${oiChgDisp}</span></td>
    <td data-col="ls">
      <div class="mini-bar-wrap">
        <span class="${lsCls}" style="font-size:12px;font-weight:600;width:38px">${lsDisplay}</span>
        <div><div class="mini-track"><div class="mini-fill-g" style="width:${lsPct}%"></div></div>
        <span style="font-size:9px;color:var(--dim)">L${lsPct}%</span></div>
      </div>
    </td>
    <td data-col="taker">
      <div class="mini-bar-wrap">
        <span class="${tkCls}" style="font-size:12px;font-weight:600;width:38px">${tkPct}%</span>
        <div><div class="mini-track"><div class="mini-fill-b" style="width:${tkPct}%"></div></div>
        <span style="font-size:9px;color:var(--dim)">B${tkPct}%</span></div>
      </div>
    </td>
    <td data-col="high52w">${hl52}</td>
    <td data-col="signal"><div class="sig-wrap">${sigs.map(s=>`<span class="badge ${s.c}">${s.t}</span>`).join('')}</div></td>
  </tr>`;
}

// ── SORT & FILTER ──
function sortBy(key) {
  if(sortKey===key) sortDir*=-1;
  else { sortKey=key; sortDir=-1; }
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('searchBox').value.trim().toUpperCase();
  const ft = document.getElementById('filterType').value;
  const sc = document.getElementById('sortCol').value;

  // parse sort dropdown
  if(sc) {
    const [k,dir]=sc.split('_');
    sortKey=k; sortDir=dir==='desc'?-1:1;
    document.getElementById('sortCol').value='';
  }

  let filtered = allCoinsData.filter(d=>{
    if(q && !d.sym.includes(q)) return false;
    if(ft==='squeeze')   return d.funding*100 < -0.01;
    if(ft==='overheated')return d.funding*100 > 0.05;
    if(ft==='longdom')   return d.ls && d.ls > 1.6;
    if(ft==='shortdom')  return d.ls && d.ls < 0.65;
    if(ft==='oiup')      return d.oiChg!==null && d.oiChg > 2;
    if(ft==='oidown')    return d.oiChg!==null && d.oiChg < -2;
    if(ft==='gainers')   return d.chg24 > 3;
    if(ft==='losers')    return d.chg24 < -3;
    return true;
  });

  // sort
  const keyMap={sym:'sym',price:'price',chg24:'chg24',vol24:'vol24',volchg:'volChgPct',mcap:d=>d.oi*d.price,funding:'funding',oi:'oi',oichg:'oiChg',ls:'ls',taker:'taker'};
  filtered.sort((a,b)=>{
    const fn=keyMap[sortKey];
    const va = typeof fn==='function'?fn(a):(a[fn]??-Infinity);
    const vb = typeof fn==='function'?fn(b):(b[fn]??-Infinity);
    return (va-vb)*sortDir;
  });

  // render
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = filtered.map((d,i)=>renderRow(d,i)).join('');

  // apply hidden cols
  hiddenCols.forEach(col=>{
    document.querySelectorAll(`[data-col="${col}"]`).forEach(el=>el.classList.add('col-hidden'));
  });

  updateStats(allCoinsData);
}

// ── STATS BAR ──
function updateStats(data) {
  const fpos = data.filter(d=>d.funding>0).length;
  const fneg = data.filter(d=>d.funding<0).length;
  const oiup = data.filter(d=>d.oiChg!==null&&d.oiChg>0).length;
  const oidn = data.filter(d=>d.oiChg!==null&&d.oiChg<0).length;
  const sq   = data.filter(d=>d.funding*100<-0.01).length;
  const sorted24 = [...data].sort((a,b)=>b.chg24-a.chg24);
  const top = sorted24[0];
  const bot = sorted24[sorted24.length-1];
  document.getElementById('s-coins').textContent = data.length;
  document.getElementById('s-fpos').textContent  = fpos;
  document.getElementById('s-fneg').textContent  = fneg;
  document.getElementById('s-oiup').textContent  = oiup;
  document.getElementById('s-oidn').textContent  = oidn;
  document.getElementById('s-sq').textContent    = sq + ' coins';
  document.getElementById('s-top').textContent   = top ? `${top.sym} +${top.chg24.toFixed(1)}%` : '–';
  document.getElementById('s-bot').textContent   = bot ? `${bot.sym} ${bot.chg24.toFixed(1)}%`  : '–';
}

// ── COLUMN TOGGLE ──
function toggleCol(btn) {
  const col = btn.dataset.col;
  btn.classList.toggle('on');
  if(btn.classList.contains('on')) hiddenCols.delete(col);
  else hiddenCols.add(col);
  document.querySelectorAll(`[data-col="${col}"]`).forEach(el=>{
    el.classList.toggle('col-hidden', !btn.classList.contains('on'));
  });
}

// ── TIMEFRAME ──
function setTF(tf, btn) {
  currentTF = tf;
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadAll();
}

// ── MAIN LOAD ──
async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading'); btn.textContent='↻ LOADING...';
  document.getElementById('loadingMsg').style.display='flex';
  document.getElementById('mainTable').style.display='none';

  try {
    const [tickers, funding] = await Promise.all([getAllTickers(), getAllFunding()]);
    const syms = Object.keys(tickers);

    // Init data with what we have
    allCoinsData = syms.map(sym=>({
      sym, ...tickers[sym],
      funding: funding[sym]??0,
      oi: null, oiChg: null, ls: null, taker: null, volChgPct: null
    }));

    // Sort by volume first, show table
    allCoinsData.sort((a,b)=>b.vol24-a.vol24);
    document.getElementById('loadingMsg').style.display='none';
    document.getElementById('mainTable').style.display='';
    applyFilters();

    // Load detailed data in batches (top 80 by volume)
    const top80 = allCoinsData.slice(0,80);
    const BATCH = 5;
    for(let i=0;i<top80.length;i+=BATCH) {
      const batch = top80.slice(i,i+BATCH);
      await Promise.all(batch.map(async d=>{
        const [oi, oiChg, ls, taker, volChgPct] = await Promise.all([
          getOI(d.sym), getOIChange(d.sym), getLSRatio(d.sym), getTaker(d.sym), getVolChange(d.sym)
        ]);
        d.oi=oi; d.oiChg=oiChg; d.ls=ls; d.taker=taker; d.volChgPct=volChgPct;
      }));
      applyFilters();
      if(i+BATCH<top80.length) await sleep(350);
    }

    document.getElementById('lastUpd').textContent='Updated '+new Date().toLocaleTimeString('vi-VN');
  } catch(e) {
    console.error(e);
    document.getElementById('loadingMsg').innerHTML=`<span style="color:var(--red)">⚠ Lỗi: ${e.message}</span>`;
  }

  btn.classList.remove('loading'); btn.textContent='↻ REFRESH';
}

setInterval(loadAll, 60000);
loadAll();
</script>
